<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christopher Santos | Portfólio</title>
    <meta name="description" content="Portfólio de Christopher Santos — Ciência de Dados, Power BI, Automação, IA e Sistemas." id="page-description">
    <link rel="icon" href="assets/generated/cs-mark.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="shell">

        <!-- ======== HEADER ======== -->
        <header class="header">
            <div class="header-left">
                <div class="avatar-group">
                    <div class="avatar">
                        <img src="assets/images/5143198770203307786.jpg" alt="Christopher Santos">
                    </div>
                </div>
                <span class="user-name">
                    <span class="user-name__full">Christopher Santos</span>
                    <span class="user-name__short">Christopher</span>
                </span>
            </div>

            <div class="header-right">
                <span class="header-time" id="clock">00:00</span>
                <div class="signal-bars">
                    <span></span><span></span><span></span><span></span>
                </div>
                <img src="assets/icons/wifi.png" alt="Wi-Fi" class="wifi-icon">
                <span>82%</span>
                <div class="battery">
                    <div class="battery-level"></div>
                    <div class="battery-tip"></div>
                </div>
            </div>
        </header>

        <!-- ======== CATEGORY TITLE ======== -->
        <div class="category-title-bar">
            <h2 class="category-title" id="category-title">DATA SCIENCE PROJECT</h2>
        </div>

        <!-- ======== CAROUSEL ======== -->
        <div class="carousel-area">
            <div class="carousel-wrapper">
                <div class="carousel-track" id="carousel-track">
                    <!-- Cards are injected by JS -->
                </div>
            </div>
            <div class="carousel-dots" id="carousel-dots"></div>
        </div>

        <!-- ======== DOCK ======== -->
        <nav class="dock-bar" id="dock-bar" aria-label="Categorias do portfólio">
            <!-- Dock icons injected by JS -->
        </nav>

        <!-- ======== FOOTER BAR ======== -->
        <footer class="footer-bar">
            <div class="footer-right">
                <button class="footer-action footer-action--github" id="btn-view-project">
                    <span class="footer-action__key" id="btn-view-project-key">+</span>
                    <span id="btn-view-project-label">Ver GitHub</span>
                </button>
                <button class="footer-action footer-action--language" id="btn-open-details">
                    <span class="footer-action__key" id="btn-open-details-key">=</span>
                    <span id="btn-open-details-label">Português/English</span>
                </button>
            </div>
        </footer>

        <!-- ======== DISCLAIMER ======== -->
        <div class="disclaimer-card" id="disclaimer-card">
            <span class="disclaimer-icon">🔒</span>
            <p id="disclaimer-text">Todos os dados usados são exclusivamente para fins de demonstração, garantindo total privacidade e conformidade ética.</p>
        </div>

    </div>

    <!-- ======== MODAL ======== -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-dialog">
            <button class="modal-close" id="modal-close">&times;</button>
            <div class="modal-header">
                <p class="modal-category" id="modal-category"></p>
                <h2 class="modal-title" id="modal-title"></h2>
            </div>
            <div class="modal-thumb" id="modal-thumb"></div>
            <div class="modal-description" id="modal-description"></div>
            <div class="modal-tags" id="modal-tags"></div>
            <div class="modal-actions" id="modal-actions"></div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
